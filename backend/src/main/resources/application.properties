server.port=8080
spring.application.name=plantitas-backend
spring.datasource.url=jdbc:h2:mem:plantitasdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
weather.api.base-url=https://api.open-meteo.com
weather.api.connect-timeout-ms=2500
weather.api.read-timeout-ms=3500
weather.api.cache-ttl-ms=120000
weather.api.cache-precision=3
geocoding.api.base-url=https://nominatim.openstreetmap.org
geocoding.api.connect-timeout-ms=2500
geocoding.api.read-timeout-ms=3500
geocoding.api.cache-ttl-ms=300000
geocoding.api.cache-precision=3
